<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Alchimax - Grimoire d'Alchimie JDR">
    <meta property="og:description" content="Simulateur de craft et encyclopédie d'herboristerie pour vos campagnes de JDR.">
    <meta property="og:image" content="img/ton-chaudron-grand.png">
    <meta property="og:type" content="website">
    <meta name="description" content="Alchimax : pour faire de l'alchimie un max!">
    <title>Alchimax</title>
    <link rel="stylesheet" href="style.css?v=1.0">
    <script src="app.js?v=1.0" defer></script>
    <link rel="icon" href="img/cauldronicon-48.png" type="image/png">
    <link rel="apple-touch-icon" href="img/cauldronicon-192.png">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- HEADER & GLOBAL FILTERS -->
    <header class="main-header">
        <h1>Alchimax</h1>
        <div class="filter-container">
            <span class="filter-label">Filtres :</span>
            <button class="btn-filter active" data-filter="all">Tous</button>
            <button class="btn-filter" data-filter="alchemy">Alchimie</button>
            <button class="btn-filter" data-filter="herbalism">Herboristerie</button>
            <button class="btn-filter" data-filter="poison">Poisons & Toxines</button>
        </div>
    </header>

    <!-- NAVIGATION BETWEEN MODES -->
    <nav class="mode-navigation">
        <button class="btn-mode active" id="btn-mode-encyclo">📖 Encyclopédie des Recettes</button>
        <button class="btn-mode" id="btn-mode-cauldron">🧪 Le Chaudron</button>
    </nav>

    <!-- MAIN APP CONTAINER -->
    <main class="app-container">
        
        <!-- SECTION 1 : ENCYCLOPEDIA VIEW -->
        <section id="view-encyclopedia" class="view-section">
            <div class="grid-layout">
                <!-- Left panel -->
                <div class="list-panel" id="encyclo-list">
                    <h2>Rechercher une Recette</h2>
                    
                    <!-- Search box -->
                    <div class="search-box">
                        <input type="text" id="search-potion" placeholder="Ex: Potion de soin, Feu grégeois...">
                    </div>
                    
                    <!-- Rarity filter -->
                    <div class="sub-filters">
                        <select id="select-rarity">
                            <option value="all">-- Toutes les raretés --</option>
                            <option value="common">Commun</option>
                            <option value="uncommon">Peu commun</option>
                            <option value="rare">Rare</option>
                            <option value="veryrare">Très Rare</option>
                        </select> 
                    </div>

                    <!-- Results container -->
                    <div id="encyclo-results-container" class="results-scroll">
                    </div>
                </div>

                <!-- Right preview panel -->
                <div class="preview-panel" id="encyclo-preview">
                    <div class="preview-placeholder">
                        <p>Sélectionnez un ingrédient ou une potion pour voir les détails.</p>
                    </div>
                </div>

            </div>
        </section>

        <!-- SECTION 2 : CAULDRON VIEW -->
        <section id="view-cauldron" class="view-section hidden">
            <div class="grid-layout">
                <!-- Player inventory -->
                <div class="list-panel" id="player-inventory">
                    <h2>Votre Inventaire</h2>
                    <p class="short-desc">Renseignez vos composants disponibles :</p>
                
                    
                    <!-- Ingredient search -->
                    <div class="search-box">
                        <input type="text" id="search-ingredient" placeholder="Rechercher un composant (ex: Lys, Venin)...">
                    </div>
                    
                    <div class="sub-filters">
                        <select id="select-rarity-ingredient">
                            <option value="all">-- Toutes les raretés --</option>
                            <option value="common">Commun</option>
                            <option value="uncommon">Peu commun</option>
                            <option value="rare">Rare</option>
                            <option value="veryrare">Très Rare</option>
                            <option value="legendary">Légendaire</option>
                        </select>

                        <select id="select-type-ingredient">
                            <option value="all">-- Tous les types --</option>
                            <option value="vegetal">🌿 Végétaux</option>
                            <option value="creature">⚔️ Créatures</option>
                            <option value="potion">🧪 Spéciaux</option>
                        </select>
                    </div>

                    <button id="btn-reset-inventory" style="background-color: #d84315; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px;">
                        🗑️ Vider le sac
                    </button>

                    <!-- Inventory inputs list -->
                    <div id="inventory-inputs-container" class="results-scroll">
                    </div>
                </div>
                
                <!-- Craft results -->
                <div class="preview-panel" id="craft-results">
                    <h2>Résultats du Laboratoire</h2>
                    
                    <div class="craft-group" style="margin-top: 20px;">
                        <h3 style="color: var(--accent-herb); margin-bottom: 10px;">✅ Craftables immédiatement</h3>
                        <div class="craft-list" id="craft-ready"></div>
                    </div>
                    
                    <div class="craft-group" style="margin-top: 30px;">
                        <h3 style="color: #e65100; margin-bottom: 10px;">⚠️ Ingrédients manquants (Presque craftables)</h3>
                        <div class="craft-list" id="craft-almost"></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
