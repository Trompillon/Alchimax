<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alchimax - Gestionnaire d'Alchimie D&D 5e</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js" defer></script>
</head>
<body>

    <!-- HEADER & FILTRES GLOBACUX -->
    <header class="main-header">
        <h1>Alchimax</h1>
        <div class="filter-container">
            <span class="filter-label">Filtres :</span>
            <button class="btn-filter active" data-filter="all">Tous</button>
            <button class="btn-filter" data-filter="alchimie">Alchimie</button>
            <button class="btn-filter" data-filter="herboristerie">Herboristerie</button>
            <button class="btn-filter" data-filter="poison">Poisons & Toxines</button>
        </div>
    </header>

    <!-- NAVIGATION ENTRE LES DEUX MODES -->
    <nav class="mode-navigation">
        <button class="btn-mode active" id="btn-mode-encyclo">📖 Encyclopédie des Recettes</button>
        <button class="btn-mode" id="btn-mode-chaudron">🧪 Le Chaudron (Craft Inversé)</button>
    </nav>

    <!-- CONTENEUR PRINCIPAL MUTABLE -->
    <main class="app-container">
        
        <!-- SECTION 1 : MODE ENCYCLOPÉDIE (Actif par défaut) -->
        <section id="view-encyclopedia" class="view-section">
            <div class="grid-layout">
                <!-- Liste gauche (générée en JS) -->
                <div class="list-panel" id="encyclo-list">
                    <h2>Rechercher une Recette</h2>
                    
                    <!-- Barre de recherche rapide -->
                    <div class="search-box">
                        <input type="text" id="search-potion" placeholder="Ex: Potion de soin, Feu grégeois...">
                    </div>
                    
                    <!-- Filtre par rareté spécifique aux potions -->
                    <div class="sub-filters">
                        <select id="select-rarete">
                            <option value="all">-- Toutes les raretés --</option>
                            <option value="commun">Commun</option>
                            <option value="peu-commun">Peu commun</option>
                            <option value="rare">Rare</option>
                            <option value="tres-rare">Très Rare</option>
                        </select> 
                    </div>

                    <!-- La liste des résultats, qui sera très courte grâce aux filtres -->
                    <div id="encyclo-results-container" class="results-scroll">
                        <!-- Généré par le JS : uniquement les titres des potions filtrées -->
                    </div>
                </div>

                <!-- LE VOICI DE RETOUR : Le panneau de prévisualisation droite -->
                <div class="preview-panel" id="encyclo-preview">
                    <div class="preview-placeholder">
                        <p>Sélectionnez un ingrédient ou une potion pour voir les détails.</p>
                    </div>
                </div>

            </div>
        </section>

        <!-- SECTION 2 : MODE CHAUDRON (Masqué au démarrage) -->
        <section id="view-cauldron" class="view-section hidden">
            <div class="grid-layout">
                <!-- Inventaire du joueur à gauche -->
                <div class="list-panel" id="player-inventory">
                    <h2>Votre Inventaire</h2>
                    <p class="short-desc">Renseignez vos composants disponibles :</p>
                    
                    <!-- RECHERCHE DE COMPOSANTS -->
                    <div class="search-box">
                        <input type="text" id="search-ingredient" placeholder="Rechercher un composant (ex: Lys, Venin)...">
                    </div>
                    
                    <div class="sub-filters">
                        <select id="select-rarete-ingredient">
                            <option value="all">-- Toutes les raretés --</option>
                            <option value="commun">Commun</option>
                            <option value="peu-commun">Peu commun</option>
                            <option value="rare">Rare</option>
                            <option value="tres-rare">Très Rare</option>
                        </select> 
                    </div>

                    <!-- Conteneur pour la liste des ingrédients avec compteurs -->
                    <div id="inventory-inputs-container" class="results-scroll">
                        <!-- Généré en JS -->
                    </div>
                </div>
                
                <!-- Résultats du craft à droite -->
                <div class="preview-panel" id="craft-results">
                    <h2>Résultats du Laboratoire</h2>
                    
                    <div class="craft-group" style="margin-top: 20px;">
                        <h3 style="color: var(--accent-herb); margin-bottom: 10px;">✅ Craftables immédiatement</h3>
                        <div class="craft-list" id="craft-ready"></div>
                    </div>
                    
                    <div class="craft-group" style="margin-top: 30px;">
                        <h3 style="color: #e65100; margin-bottom: 10px;">⚠️ Ingrédients manquants (Presque craftables)</h3>
                        <div class="craft-list" id="craft-almost"></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
